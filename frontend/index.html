<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Alunos - Academia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Cadastro de Alunos</h1>

        <form @submit.prevent="adicionarAluno">
            <input v-model="novoAluno.nome" placeholder="Nome" required>
            <input v-model="novoAluno.telefone" placeholder="Telefone">
            <input v-model="novoAluno.idade" type="number" placeholder="Idade">
            <input v-model="novoAluno.contato" placeholder="Contato">
            <input v-model="novoAluno.modalidade" placeholder="Modalidade">
            <input v-model="novoAluno.plano" placeholder="Plano">
            <input v-model="novoAluno.mensalidade" type="number" step="0.01" placeholder="Mensalidade">
            <input v-model="novoAluno.observacao" placeholder="Observação">
            <button type="submit">Adicionar Aluno</button>
        </form>

        <h2>Alunos Cadastrados</h2>
        <table>
            <tr>
                <th>Nome</th><th>Telefone</th><th>Idade</th><th>Modalidade</th><th>Plano</th><th>Mensalidade</th><th>Ações</th>
            </tr>
            <tr v-for="aluno in alunos" :key="aluno.id">
                <td>{{ aluno.nome }}</td>
                <td>{{ aluno.telefone }}</td>
                <td>{{ aluno.idade }}</td>
                <td>{{ aluno.modalidade }}</td>
                <td>{{ aluno.plano }}</td>
                <td>{{ aluno.mensalidade }}</td>
                <td>
                    <button @click="excluirAluno(aluno.id)">Excluir</button>
                </td>
            </tr>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <script src="app.js"></script>
</body>
</html>
